<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇艺科技 - 智能导航网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部样式 */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .time-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        #current-time {
            font-size: 2.5rem;
            font-weight: 300;
            color: #4a5568;
        }
        
        #current-year {
            font-size: 1.2rem;
            color: #718096;
        }
        
        /* 问候语样式 */
        .greeting {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.5s ease;
        }
        
        .greeting.show {
            display: block;
        }
        
        .greeting.hidden {
            display: none;
        }
        
        .greeting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .greeting-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        #greeting-text {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        
        /* 搜索栏样式 */
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .search-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-tab {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: #f7fafc;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        /* 主标签样式 */
        .main-tabs {
            display: flex;
            background: white;
            border-radius: 15px 15px 0 0;
            overflow-x: auto;
            padding: 0 20px;
        }
        
        .main-tab {
            padding: 20px 30px;
            border: none;
            background: none;
            font-size: 1.1rem;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
        }
        
        .main-tab.active {
            color: #667eea;
        }
        
        .main-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
        }
        
        /* 内容区样式 */
        .content-section {
            background: white;
            border-radius: 0 0 15px 15px;
            padding: 30px;
            min-height: 500px;
        }
        
        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .link-item {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .link-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .link-item a {
            color: #4a5568;
            text-decoration: none;
            font-size: 1.1rem;
            display: block;
        }
        
        .link-item a:hover {
            color: #667eea;
        }
        
        .link-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
        }
        
        .btn-secondary {
            background: #718096;
            color: white;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        /* 控制栏样式 */
        .control-section {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            min-width: 300px;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .notification.show {
            display: block;
            transform: translateX(0);
        }
        
        .notification.success {
            border-left: 4px solid #48bb78;
        }
        
        .notification.error {
            border-left: 4px solid #f56565;
        }
        
        .notification.warning {
            border-left: 4px solid #ed8936;
        }
        
        .notification.info {
            border-left: 4px solid #4299e1;
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .notification-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #718096;
        }
        
        /* 模态框样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            min-width: 400px;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #718096;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        
        /* 动画 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .time-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            #current-time {
                font-size: 1.8rem;
            }
            
            .main-tabs {
                overflow-x: auto;
                padding: 0 10px;
            }
            
            .main-tab {
                padding: 15px 20px;
                font-size: 1rem;
            }
            
            .content-section {
                padding: 20px;
            }
            
            .links-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            
            .modal-content {
                min-width: 90%;
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="time-section">
                <div>
                    <div id="current-time">正在加载时间...</div>
                    <div>© <span id="current-year">2026</span> 奇艺科技 - 智能导航</div>
                </div>
                <div class="control-section">
                    <button id="set-homepage" class="btn btn-success">设为主页</button>
                    <button id="refresh-page" class="btn btn-warning">刷新页面</button>
                    <button id="toggle-permission" class="btn btn-warning">🔒 解锁管理</button>
                </div>
            </div>
            
            <!-- 问候语 -->
            <div id="greeting" class="greeting hidden">
                <div class="greeting-header">
                    <h3>📢 智能问候</h3>
                    <button id="greeting-close" class="greeting-close">×</button>
                </div>
                <div id="greeting-text">正在生成问候语...</div>
            </div>
            
            <!-- 搜索栏 -->
            <div class="search-section">
                <div class="search-tabs">
                    <button class="search-tab active" data-tab="web">网页</button>
                    <button class="search-tab" data-tab="news">新闻</button>
                    <button class="search-tab" data-tab="mp3">音乐</button>
                    <button class="search-tab" data-tab="video">视频</button>
                    <button class="search-tab" data-tab="image">图片</button>
                    <button class="search-tab" data-tab="map">地图</button>
                    <button class="search-tab" data-tab="qa">问答</button>
                    <button class="search-tab" data-tab="shopping">购物</button>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" value="请输入搜索关键词..." placeholder="请输入搜索关键词...">
                    <button class="search-btn">百度一下</button>
                </div>
            </div>
        </div>
        
        <!-- 主标签 -->
        <div class="main-tabs">
            <button class="main-tab active" data-tab="recommended">推荐</button>
            <button class="main-tab" data-tab="proxy">代理</button>
            <button class="main-tab" data-tab="internal">内部</button>
            <button class="main-tab" data-tab="software">软件</button>
            <button class="main-tab" data-tab="business">商务</button>
            <button class="main-tab" data-tab="common">常用</button>
            <button class="main-tab" data-tab="finance">金融</button>
            <button class="main-tab" data-tab="work">工作</button>
            <button class="main-tab" data-tab="side">副业/AI</button>
        </div>
        
        <!-- 内容区 -->
        <div class="content-section">
            <div id="recommended-links" class="links-container">
                <!-- 推荐链接会动态加载 -->
            </div>
            <div id="proxy-links" class="links-container" style="display: none;"></div>
            <div id="internal-links" class="links-container" style="display: none;"></div>
            <div id="software-links" class="links-container" style="display: none;"></div>
            <div id="business-links" class="links-container" style="display: none;"></div>
            <div id="common-links" class="links-container" style="display: none;"></div>
            <div id="finance-links" class="links-container" style="display: none;"></div>
            <div id="work-links" class="links-container" style="display: none;"></div>
            <div id="side-links" class="links-container" style="display: none;"></div>
            
            <div class="control-section">
                <button id="add-link-btn" class="btn btn-success" disabled>添加网址</button>
                <button id="export-data" class="btn btn-secondary">导出数据</button>
                <button class="add-link-btn btn btn-success" data-tab="recommended" disabled>在此分类添加</button>
            </div>
        </div>
    </div>
    
    <!-- 通知 -->
    <div id="notification" class="notification">
        <div class="notification-header">
            <strong>通知</strong>
            <button id="notification-close" class="notification-close">×</button>
        </div>
        <div id="notification-text">通知内容</div>
    </div>
    
    <!-- 添加/编辑网址模态框 -->
    <div id="link-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">添加网址</h3>
                <button id="modal-close" class="modal-close">×</button>
            </div>
            <form id="link-form">
                <input type="hidden" id="link-index" value="">
                <div class="form-group">
                    <label for="link-name">网站名称</label>
                    <input type="text" id="link-name" required placeholder="例如：百度">
                </div>
                <div class="form-group">
                    <label for="link-url">网站地址</label>
                    <input type="url" id="link-url" required placeholder="https://www.baidu.com">
                </div>
                <div class="form-group">
                    <label for="link-category">分类</label>
                    <select id="link-category" required>
                        <option value="recommended">推荐</option>
                        <option value="proxy">代理</option>
                        <option value="internal">内部</option>
                        <option value="software">软件</option>
                        <option value="business">商务</option>
                        <option value="common">常用</option>
                        <option value="finance">金融</option>
                        <option value="work">工作</option>
                        <option value="side">副业/AI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="link-color">颜色样式（可选）</label>
                    <select id="link-color">
                        <option value="">默认</option>
                        <option value="important">重要（红色）</option>
                        <option value="warning">警告（橙色）</option>
                        <option value="success">成功（绿色）</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn btn-success">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 权限验证模态框 -->
    <div id="permission-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>管理权限验证</h3>
                <button id="permission-modal-close" class="modal-close">×</button>
            </div>
            <div class="form-group">
                <label for="permission-password">请输入管理密码</label>
                <input type="password" id="permission-password" placeholder="默认密码：admin123" autofocus>
            </div>
            <div class="form-actions">
                <button type="button" id="cancel-permission" class="btn btn-secondary">取消</button>
                <button type="button" id="confirm-permission" class="btn btn-success">验证</button>
            </div>
        </div>
    </div>
    
    <!-- 修改密码模态框 -->
    <div id="change-password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改管理密码</h3>
                <button id="change-password-modal-close" class="modal-close">×</button>
            </div>
            <div class="form-group">
                <label for="current-password">当前密码</label>
                <input type="password" id="current-password" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label for="new-password">新密码</label>
                <input type="password" id="new-password" placeholder="请输入新密码（至少6位）">
            </div>
            <div class="form-group">
                <label for="confirm-password">确认新密码</label>
                <input type="password" id="confirm-password" placeholder="请再次输入新密码">
            </div>
            <div class="form-actions">
                <button type="button" id="cancel-change-password" class="btn btn-secondary">取消</button>
                <button type="button" id="confirm-change-password" class="btn btn-success">确认修改</button>
            </div>
        </div>
    </div>
    
    <!-- 导入数据模态框 -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>导入数据</h3>
                <button id="import-modal-close" class="modal-close">×</button>
            </div>
            <div class="form-group">
                <label for="import-data">请输入JSON格式的数据</label>
                <textarea id="import-data" rows="10" placeholder="请粘贴JSON格式的数据..."></textarea>
            </div>
            <div class="form-actions">
                <button type="button" id="cancel-import" class="btn btn-secondary">取消</button>
                <button type="button" id="confirm-import" class="btn btn-success">导入</button>
            </div>
        </div>
    </div>

    <script>
        // 权限管理相关变量
        let hasPermission = false;
        let permissionTimeout = null;
        const PERMISSION_DURATION = 30 * 60 * 1000; // 30分钟

        // 时间显示功能
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                weekday: 'short'
            });
            document.getElementById('current-time').textContent = timeString;
        }

        // 智能问候语功能
        function updateGreeting() {
            const now = new Date();
            const hour = now.getHours();
            const greetingElement = document.getElementById('greeting-text');
            let greeting = '';
            
            if (hour >= 5 && hour < 9) {
                greeting = '🌅 早上好！新的一天开始了，祝您工作愉快！';
            } else if (hour >= 9 && hour < 12) {
                greeting = '☀️ 上午好！工作顺利吗？需要我帮您查找什么吗？';
            } else if (hour >= 12 && hour < 14) {
                greeting = '🍱 中午好！记得适当休息，保持精力充沛！';
            } else if (hour >= 14 && hour < 18) {
                greeting = '💼 下午好！继续加油，高效完成工作！';
            } else if (hour >= 18 && hour < 22) {
                greeting = '🌙 晚上好！工作辛苦了，注意劳逸结合！';
            } else {
                greeting = '🌜 夜深了，注意休息，保持健康的工作生活平衡！';
            }
            
            // 添加智能提示
            const dayOfWeek = now.getDay();
            if (dayOfWeek === 1) { // 周一
                greeting += ' 新的一周开始了，祝您工作顺利！';
            } else if (dayOfWeek === 5) { // 周五
                greeting += ' 周末即将来临，提前祝您周末愉快！';
            }
            
            // 检查是否节假日
            const month = now.getMonth() + 1;
            const date = now.getDate();
            if ((month === 1 && date === 1) || (month === 5 && date === 1) || 
                (month === 10 && (date >= 1 && date <= 7))) {
                greeting += ' 节日快乐！';
            }
            
            greetingElement.textContent = greeting;
            
            // 显示问候语（如果之前没有隐藏）
            const greetingContainer = document.getElementById('greeting');
            if (!localStorage.getItem('greetingHidden')) {
                greetingContainer.classList.remove('hidden');
                greetingContainer.classList.add('show');
                
                // 5秒后自动隐藏
                setTimeout(() => {
                    hideGreeting();
                }, 5000);
            }
        }

        // 隐藏问候语
        function hideGreeting() {
            const greetingContainer = document.getElementById('greeting');
            greetingContainer.classList.add('hidden');
            greetingContainer.classList.remove('show');
            localStorage.setItem('greetingHidden', 'true');
        }

        // 设置当前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // 通知功能
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = message;
            
            // 移除所有类型类
            const types = ['success', 'error', 'warning', 'info'];
            types.forEach(t => {
                notification.classList.remove(t);
            });
            
            // 添加当前类型类
            notification.classList.add(type);
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        document.getElementById('notification-close').addEventListener('click', function() {
            document.getElementById('notification').classList.remove('show');
        });

        // 设为主页功能
        document.getElementById('set-homepage').addEventListener('click', function() {
            try {
                this.style.behavior = 'url(#default#homepage)';
                this.setHomePage('http://192.168.31.118');
                showNotification('主页设置成功！', 'success');
            } catch(e) {
                showNotification('您的浏览器不支持自动设置主页，请手动设置。', 'warning');
            }
        });

        // 刷新页面
        document.getElementById('refresh-page').addEventListener('click', function() {
            // 清除问候语隐藏状态，使下次刷新时显示
            localStorage.removeItem('greetingHidden');
            location.reload();
        });

        // 搜索标签切换
        const searchTabs = document.querySelectorAll('.search-tab');
        searchTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                searchTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

        function getPasswordFromStorage() {
            return localStorage.getItem('qiyiTechAdminPassword') || 'admin123';
        }

        function setPasswordToStorage(password) {
            localStorage.setItem('qiyiTechAdminPassword', password);
        }

        function checkPermission(password) {
            return password === getPasswordFromStorage();
        }

        function grantPermission() {
            hasPermission = true;
            updatePermissionUI();
            
            // 设置权限超时
            if (permissionTimeout) {
                clearTimeout(permissionTimeout);
            }
            permissionTimeout = setTimeout(() => {
                hasPermission = false;
                updatePermissionUI();
                showNotification('管理权限已过期，请重新验证', 'warning');
            }, PERMISSION_DURATION);
        }

        function revokePermission() {
            hasPermission = false;
            updatePermissionUI();
            
            if (permissionTimeout) {
                clearTimeout(permissionTimeout);
                permissionTimeout = null;
            }
        }

        function updatePermissionUI() {
            const addLinkBtn = document.getElementById('add-link-btn');
            const addLinkBtnBottom = document.querySelector('.add-link-btn');
            const togglePermissionBtn = document.getElementById('toggle-permission');
            
            if (hasPermission) {
                addLinkBtn.disabled = false;
                addLinkBtnBottom.disabled = false;
                togglePermissionBtn.innerHTML = '🔓 锁定管理';
                togglePermissionBtn.classList.remove('btn-warning');
                togglePermissionBtn.classList.add('btn-success');
            } else {
                addLinkBtn.disabled = true;
                addLinkBtnBottom.disabled = true;
                togglePermissionBtn.innerHTML = '🔒 解锁管理';
                togglePermissionBtn.classList.remove('btn-success');
                togglePermissionBtn.classList.add('btn-warning');
            }
        }

        function requirePermission(callback) {
            if (hasPermission) {
                callback();
            } else {
                showNotification('请先解锁管理权限', 'warning');
                document.getElementById('permission-modal').style.display = 'flex';
                // 保存回调函数以便验证后执行
                document.getElementById('permission-modal').dataset.callback = callback.toString();
            }
        }

        // 从localStorage加载数据
        function loadDataFromStorage() {
            const savedData = localStorage.getItem('qiyiTechLinkData');
            if (savedData) {
                try {
                    const parsedData = JSON.parse(savedData);
                    // 合并保存的数据和默认数据
                    for (const category in parsedData) {
                        if (linkData[category]) {
                            // 保留默认数据，只添加不在默认数据中的自定义数据
                            const defaultNames = linkData[category].map(item => item.name);
                            const customItems = parsedData[category].filter(item => !defaultNames.includes(item.name));
                            linkData[category] = [...linkData[category], ...customItems];
                        }
                    }
                } catch (e) {
                    console.error('加载保存的数据失败:', e);
                }
            }
        }

        // 保存数据到localStorage
        function saveDataToStorage() {
            localStorage.setItem('qiyiTechLinkData', JSON.stringify(linkData));
        }

        // 加载标签数据
        function loadTabData(tabName) {
            const container = document.getElementById(`${tabName}-links`);
            if (!container || !linkData[tabName]) return;
            
            container.innerHTML = '';
            
            linkData[tabName].forEach((link, index) => {
                const linkItem = document.createElement('div');
                linkItem.className = `link-item ${link.class}`;
                
                // 根据权限状态决定是否显示操作按钮
                const actionsHtml = hasPermission ? 
                    `<div class="link-actions">
                        <button class="btn btn-small btn-secondary edit-link" data-category="${tabName}" data-index="${index}">编辑</button>
                        <button class="btn btn-small btn-danger delete-link" data-category="${tabName}" data-index="${index}">删除</button>
                    </div>` : '';
                
                linkItem.innerHTML = `
                    <a href="${link.url}" target="_blank" title="${link.name}">${link.name}</a>
                    ${actionsHtml}
                `;
                container.appendChild(linkItem);
            });
            
            // 添加编辑和删除事件监听
            if (hasPermission) {
                container.querySelectorAll('.edit-link').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const category = this.dataset.category;
                        const index = parseInt(this.dataset.index);
                        editLink(category, index);
                    });
                });
                
                container.querySelectorAll('.delete-link').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const category = this.dataset.category;
                        const index = parseInt(this.dataset.index);
                        deleteLink(category, index);
                    });
                });
            }
        }

        // 添加新链接
        function addLink(category, name, url, colorClass = '') {
            if (!linkData[category]) {
                linkData[category] = [];
            }
            
            linkData[category].push({
                name: name,
                url: url,
                class: colorClass
            });
            
            saveDataToStorage();
            loadTabData(category);
            showNotification('网址添加成功！', 'success');
        }

        // 编辑链接
        function editLink(category, index) {
            const link = linkData[category][index];
            
            document.getElementById('modal-title').textContent = '编辑网址';
            document.getElementById('link-index').value = `${category},${index}`;
            document.getElementById('link-name').value = link.name;
            document.getElementById('link-url').value = link.url;
            document.getElementById('link-category').value = category;
            document.getElementById('link-color').value = link.class;
            
            document.getElementById('link-modal').style.display = 'flex';
        }

        // 删除链接
        function deleteLink(category, index) {
            if (confirm('确定要删除这个网址吗？')) {
                linkData[category].splice(index, 1);
                saveDataToStorage();
                loadTabData(category);
                showNotification('网址删除成功！', 'success');
            }
        }

        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(linkData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'qiyi-tech-links.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('数据导出成功！', 'success');
        }

        // 导入数据
        function importData() {
            document.getElementById('import-modal').style.display = 'flex';
        }

        // 初始化加载推荐网址和问候语
        window.onload = function() {
            loadDataFromStorage();
            loadTabData('recommended');
            updateGreeting();
            updatePermissionUI(); // 初始化权限UI
        };

        // 搜索输入框获取焦点时清除提示
        document.querySelector('.search-input').addEventListener('focus', function() {
            if (this.value === '请输入搜索关键词...') {
                this.value = '';
            }
        });

        // 搜索输入框失去焦点时恢复提示
        document.querySelector('.search-input').addEventListener('blur', function() {
            if (this.value === '') {
                this.value = '请输入搜索关键词...';
            }
        });

        // 回车键搜索
        document.querySelector('.search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.search-btn').click();
            }
        });

        // 添加网址按钮事件
        document.getElementById('add-link-btn').addEventListener('click', function() {
            requirePermission(() => {
                document.getElementById('modal-title').textContent = '添加网址';
                document.getElementById('link-index').value = '';
                document.getElementById('link-name').value = '';
                document.getElementById('link-url').value = '';
                document.getElementById('link-category').value = document.querySelector('.add-link-btn').dataset.tab;
                document.getElementById('link-color').value = '';
                
                document.getElementById('link-modal').style.display = 'flex';
            });
        });

        // 底部添加网址按钮事件
        document.querySelector('.add-link-btn').addEventListener('click', function() {
            requirePermission(() => {
                document.getElementById('modal-title').textContent = '添加网址';
                document.getElementById('link-index').value = '';
                document.getElementById('link-name').value = '';
                document.getElementById('link-url').value = '';
                document.getElementById('link-category').value = this.dataset.tab;
                document.getElementById('link-color').value = '';
                
                document.getElementById('link-modal').style.display = 'flex';
            });
        });

        // 添加网址表单提交
        document.getElementById('link-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('link-name').value;
            const url = document.getElementById('link-url').value;
            const category = document.getElementById('link-category').value;
            const color = document.getElementById('link-color').value;
            const indexValue = document.getElementById('link-index').value;
            
            if (indexValue) {
                // 编辑现有链接
                const [cat, idx] = indexValue.split(',');
                linkData[cat][idx].name = name;
                linkData[cat][idx].url = url;
                linkData[cat][idx].class = color;
                
                // 如果分类改变了，移动到新分类
                if (cat !== category) {
                    const link = linkData[cat][idx];
                    linkData[cat].splice(idx, 1);
                    linkData[category].push(link);
                }
                
                saveDataToStorage();
                loadTabData(category);
                if (cat !== category) {
                    loadTabData(cat);
                }
                showNotification('网址更新成功！', 'success');
            } else {
                // 添加新链接
                addLink(category, name, url, color);
            }
            
            document.getElementById('link-modal').style.display = 'none';
        });

        // 导出数据按钮事件
        document.getElementById('export-data').addEventListener('click', exportData);

        // 导入数据按钮事件
        document.getElementById('export-data').addEventListener('contextmenu', function(e) {
            e.preventDefault();
            requirePermission(() => {
                importData();
            });
        });

        // 权限切换按钮事件
        document.getElementById('toggle-permission').addEventListener('click', function() {
            if (hasPermission) {
                revokePermission();
                showNotification('管理权限已锁定', 'info');
            } else {
                document.getElementById('permission-modal').style.display = 'flex';
            }
        });

        // 权限验证按钮事件
        document.getElementById('confirm-permission').addEventListener('click', function() {
            const password = document.getElementById('permission-password').value;
            
            if (checkPermission(password)) {
                grantPermission();
                document.getElementById('permission-modal').style.display = 'none';
                document.getElementById('permission-password').value = '';
                showNotification('管理权限已解锁', 'success');
                
                // 执行保存的回调函数
                const callbackStr = document.getElementById('permission-modal').dataset.callback;
                if (callbackStr) {
                    const callback = eval(`(${callbackStr})`);
                    callback();
                    document.getElementById('permission-modal').dataset.callback = '';
                }
            } else {
                showNotification('密码错误，请重试', 'error');
                document.getElementById('permission-password').value = '';
                document.getElementById('permission-password').focus();
            }
        });

        // 修改密码功能（长按权限按钮）
        let passwordTimer;
        document.getElementById('toggle-permission').addEventListener('mousedown', function() {
            passwordTimer = setTimeout(() => {
                document.getElementById('change-password-modal').style.display = 'flex';
            }, 2000); // 长按2秒
        });

        document.getElementById('toggle-permission').addEventListener('mouseup', function() {
            clearTimeout(passwordTimer);
        });

        document.getElementById('toggle-permission').addEventListener('mouseleave', function() {
            clearTimeout(passwordTimer);
        });

        // 确认修改密码
        document.getElementById('confirm-change-password').addEventListener('click', function() {
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (!checkPermission(currentPassword)) {
                showNotification('当前密码错误', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showNotification('新密码不一致', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showNotification('密码长度至少6位', 'error');
                return;
            }
            
            setPasswordToStorage(newPassword);
            document.getElementById('change-password-modal').style.display = 'none';
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            showNotification('密码修改成功', 'success');
        });

        // 确认导入数据
        document.getElementById('confirm-import').addEventListener('click', function() {
            const importDataText = document.getElementById('import-data').value;
            
            if (!importDataText) {
                showNotification('请输入要导入的数据', 'warning');
                return;
            }
            
            try {
                const importedData = JSON.parse(importDataText);
                
                // 验证数据结构
                let isValid = true;
                for (const category in importedData) {
                    if (!Array.isArray(importedData[category])) {
                        isValid = false;
                        break;
                    }
                    
                    for (const item of importedData[category]) {
                        if (!item.name || !item.url) {
                            isValid = false;
                            break;
                        }
                    }
                    
                    if (!isValid) break;
                }
                
                if (isValid) {
                    // 合并数据
                    for (const category in importedData) {
                        if (!linkData[category]) {
                            linkData[category] = [];
                        }
                        
                        // 只添加不重复的数据
                        const existingNames = linkData[category].map(item => item.name);
                        const newItems = importedData[category].filter(item => !existingNames.includes(item.name));
                        linkData[category] = [...linkData[category], ...newItems];
                    }
                    
                    saveDataToStorage();
                    
                    // 重新加载当前标签页
                    const currentTab = document.querySelector('.main-tab.active').dataset.tab;
                    loadTabData(currentTab);
                    
                    document.getElementById('import-modal').style.display = 'none';
                    showNotification('数据导入成功！', 'success');
                } else {
                    showNotification('导入的数据格式不正确', 'error');
                }
            } catch (e) {
                showNotification('导入的数据格式不正确', 'error');
            }
        });

        // 模态框关闭事件
        document.getElementById('modal-close').addEventListener('click', function() {
            document.getElementById('link-modal').style.display = 'none';
        });

        document.getElementById('cancel-btn').addEventListener('click', function() {
            document.getElementById('link-modal').style.display = 'none';
        });

        document.getElementById('permission-modal-close').addEventListener('click', function() {
            document.getElementById('permission-modal').style.display = 'none';
            document.getElementById('permission-password').value = '';
        });

        document.getElementById('cancel-permission').addEventListener('click', function() {
            document.getElementById('permission-modal').style.display = 'none';
            document.getElementById('permission-password').value = '';
        });

        document.getElementById('change-password-modal-close').addEventListener('click', function() {
            document.getElementById('change-password-modal').style.display = 'none';
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });

        document.getElementById('cancel-change-password').addEventListener('click', function() {
            document.getElementById('change-password-modal').style.display = 'none';
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });

        document.getElementById('import-modal-close').addEventListener('click', function() {
            document.getElementById('import-modal').style.display = 'none';
        });

        document.getElementById('cancel-import').addEventListener('click', function() {
            document.getElementById('import-modal').style.display = 'none';
        });

        // 点击模态框外部关闭
        window.addEventListener('click', function(e) {
            if (e.target === document.getElementById('link-modal')) {
                document.getElementById('link-modal').style.display = 'none';
            }
            if (e.target === document.getElementById('permission-modal')) {
                document.getElementById('permission-modal').style.display = 'none';
                document.getElementById('permission-password').value = '';
            }
            if (e.target === document.getElementById('change-password-modal')) {
                document.getElementById('change-password-modal').style.display = 'none';
                document.getElementById('current-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            }
            if (e.target === document.getElementById('import-modal')) {
                document.getElementById('import-modal').style.display = 'none';
            }
        });

        // 问候语关闭按钮事件
        document.getElementById('greeting-close').addEventListener('click', hideGreeting);

        // 初始化时间显示和问候语
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
