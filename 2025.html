<title>📚 汉字启蒙 · 一年级识字</title>
<style>

  }
  .container {
    background: white; border-radius: 24px; padding: 20px; max-width: 420px; width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); max-height: 96vh; overflow-y: auto;
    position: relative;
  }

  /* 标题 */
  .header { text-align: center; margin-bottom: 12px; }
  .header h1 { font-size: 22px; color: #e67e22; }
  .header .sub { font-size: 12px; color: #999; }

  /* 模块切换 */
  .tab-bar {
    display: flex; gap: 6px; margin-bottom: 12px;
  }
  .tab {
    flex: 1; padding: 8px; text-align: center; border-radius: 10px; font-size: 13px; font-weight: bold;
    border: 2px solid #eee; background: white; color: #999; cursor: pointer; transition: 0.2s;
  }
  .tab.active { border-color: #e67e22; background: #fef5e7; color: #e67e22; }
  .tab:active { transform: scale(0.95); }

  /* 学习模式 */
  .learn-area { text-align: center; padding: 10px 0; }
  .char-display {
    font-size: 80px; font-weight: bold; color: #333; line-height: 1.2;
    padding: 10px; min-height: 100px;
  }
  .char-pinyin { font-size: 22px; color: #e67e22; margin-bottom: 4px; }
  .char-info { font-size: 13px; color: #999; margin-bottom: 8px; }
  .char-example {
    font-size: 16px; color: #555; line-height: 1.8;
    background: #f9f9f9; border-radius: 12px; padding: 10px; margin: 6px 0;
  }
  .char-example span { display: inline-block; margin: 0 6px; }
  .char-example .hl { color: #e67e22; font-weight: bold; font-size: 20px; }

  .nav-buttons {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .nav-btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
    cursor: pointer; transition: 0.2s; touch-action: manipulation;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn.prev { background: #f0f0f0; color: #666; }
  .nav-btn.speak { background: #e8f5e9; color: #2e7d32; }
  .nav-btn.next { background: linear-gradient(135deg, #f7971e, #ffd200); color: white; }

  /* 听写模式 */
  .quiz-area { text-align: center; padding: 10px 0; }
  .quiz-prompt { font-size: 60px; font-weight: bold; color: #333; margin-bottom: 8px; }
  .quiz-question { font-size: 16px; color: #666; margin-bottom: 10px; }

  /* 选项网格 */
  .quiz-options {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0;
  }
  .quiz-opt {
    padding: 14px 8px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 28px;
    cursor: pointer; transition: 0.15s; touch-action: manipulation; background: white;
    font-weight: bold; color: #333;
  }
  .quiz-opt:active { transform: scale(0.93); }
  .quiz-opt.correct { border-color: #2ecc71; background: #eafaf1; animation: pop 0.3s; }
  .quiz-opt.wrong { border-color: #e74c3c; background: #fdedec; animation: shake 0.3s; }
  .quiz-opt.highlight { border-color: #f39c12; background: #fef9e7; }

  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .quiz-score {
    display: flex; justify-content: center; gap: 20px; margin: 8px 0; font-size: 14px;
  }
  .quiz-score .right { color: #2ecc71; font-weight: bold; }
  .quiz-score .wrong { color: #e74c3c; font-weight: bold; }

  /* 字卡模式 */
  .card-area { text-align: center; padding: 5px 0; }
  .card-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 6px 0;
  }
  .card {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border: 2px solid #eee; border-radius: 10px; font-size: 24px; font-weight: bold;
    cursor: pointer; transition: 0.15s; background: white; color: #333;
    touch-action: manipulation;
  }
  .card:active { transform: scale(0.9); }
  .card.learned { border-color: #2ecc71; background: #eafaf1; }
  .card.showing { border-color: #f39c12; background: #fef9e7; }

  /* 进度条 */
  .progress-bar {
    height: 6px; background: #f0f0f0; border-radius: 3px; margin: 8px 0; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: linear-gradient(90deg, #f7971e, #ffd200); border-radius: 3px;
    transition: width 0.5s;
  }

  /* 模式标题 */
  .mode-title { font-size: 14px; color: #666; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .mode-title .count { color: #999; }

  .hidden { display: none; }

  /* 页数选择器 */
  .page-selector {
    display: flex; gap: 4px; overflow-x: auto; padding: 4px 0; margin-bottom: 6px;
  }
  .page-dot {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ddd;

    cursor: pointer; transition: 0.15s; background: white; color: #999;
  }
  .page-dot.active { border-color: #e67e22; background: #fef5e7; color: #e67e22; }
</style>
</head>

<div class="container" id="app">
  <div class="header">
    <h1>📚 汉字启蒙</h1>
    <div class="sub">一年级识字 · 每天进步一点点</div>
  </div>

  <!-- 模式切换 -->
  <div class="tab-bar">
    <div class="tab active" id="tabLearn" onclick="switchMode('learn')">📖 认字</div>
    <div class="tab" id="tabQuiz" onclick="switchMode('quiz')">✍️ 听写</div>
    <div class="tab" id="tabCard" onclick="switchMode('card')">🃏 字卡</div>
  </div>

  <!-- ===== 认字模式 ===== -->
  <div id="modeLearn">
    <div class="learn-area">
      <div class="char-pinyin" id="learnPinyin">rì</div>
      <div class="char-display" id="learnChar">日</div>
      <div class="char-info" id="learnInfo">部首：日 | 笔画：4</div>
      <div class="char-example" id="learnExample">📖 <span>日光</span> <span>日出</span> <span>生日</span></div>
      <div class="progress-bar"><div class="fill" id="learnProgress" style="width:3%"></div></div>
      <div class="mode-title"><span id="learnTitle">第 1/100 字</span><span class="count" id="learnStatus">已学 0</span></div>
      <div class="nav-buttons">
        <button class="nav-btn prev" onclick="prevChar()">◀ 上一个</button>
        <button class="nav-btn speak" onclick="speakChar()">🔊 跟读</button>
        <button class="nav-btn next" onclick="nextChar()">下一个 ▶</button>
      </div>
    </div>
  </div>

  <!-- ===== 听写模式 ===== -->
  <div id="modeQuiz" class="hidden">
    <div class="quiz-area">
      <div class="quiz-score">
        <span class="right" id="quizRight">✅ 0</span>
        <span class="wrong" id="quizWrong">❌ 0</span>
        <span id="quizProgress">📝 0/10</span>
      </div>
      <div id="quizContent">
        <div class="quiz-prompt" id="quizPrompt">???</div>
        <div class="quiz-question" id="quizQuestion">请找出正确的汉字</div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>
      <div id="quizResult" class="hidden" style="text-align:center;padding:15px 0;">
        <div style="font-size:48px;margin-bottom:6px;" id="quizEmoji">🎉</div>
        <div style="font-size:18px;font-weight:bold;" id="quizResultText">太棒了！</div>
        <div style="font-size:13px;color:#666;margin-top:4px;" id="quizResultDetail">10题答对10题</div>
        <button class="nav-btn next" style="margin-top:10px;flex:none;padding:10px 30px;" onclick="startQuiz()">🔄 再来一次</button>
      </div>
    </div>
  </div>

  <!-- ===== 字卡模式 ===== -->
  <div id="modeCard" class="hidden">
    <div class="card-area">
      <div class="page-selector" id="cardPages"></div>
      <div class="card-grid" id="cardGrid"></div>
      <div class="mode-title"><span>🃏 点击字卡翻转看拼音</span><span class="count" id="cardCount">已学 0/100</span></div>
      <div class="progress-bar"><div class="fill" id="cardProgress" style="width:0%"></div></div>
    </div>
  </div>
</div>

      [523,659,784,1047].forEach((f,i)=>{let o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=f; g.gain.value=0.1; g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3); o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.3);});
    } else if (type === 'speak') {
      let o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.setValueAtTime(880,ctx.currentTime); o.frequency.setValueAtTime(1100,ctx.currentTime+0.08); g.gain.value=0.08; g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2); o.start(); o.stop(ctx.currentTime+0.2);
    }
  } catch(e) {}
}

// ===== 语音朗读 =====
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.8; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// ===== 状态 =====
let mode = 'learn';
let learnIdx = 0;
let learnedSet = new Set(JSON.parse(localStorage.getItem('hzLearned') || '[]'));
let quizIdx = 0; let quizRight = 0; let quizWrong = 0; let quizQuestions = [];

// ===== 模式切换 =====
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabLearn').classList.toggle('active', m==='learn');
  document.getElementById('tabQuiz').classList.toggle('active', m==='quiz');
  document.getElementById('tabCard').classList.toggle('active', m==='card');
  document.getElementById('modeLearn').classList.toggle('hidden', m!=='learn');
  document.getElementById('modeQuiz').classList.toggle('hidden', m!=='quiz');
  document.getElementById('modeCard').classList.toggle('hidden', m!=='card');
  
  if (m === 'learn') showLearnChar();
  else if (m === 'quiz') startQuiz();
  else if (m === 'card') renderCards();
}

// ===== 认字模式 =====
function showLearnChar() {
  const c = CHARS[learnIdx];
  document.getElementById('learnChar').textContent = c.char;
  document.getElementById('learnPinyin').textContent = c.pinyin;
  document.getElementById('learnInfo').textContent = `部首：${c.rad} | 笔画：${c.stroke}`;
  document.getElementById('learnExample').innerHTML = '📖 ' + c.words.map(w => `<span><b class="hl">${c.char}</b>${w.replace(c.char,'')}</span>`).join(' ');
  const pct = ((learnIdx + 1) / CHARS.length * 100);
  document.getElementById('learnProgress').style.width = pct + '%';
  document.getElementById('learnTitle').textContent = `第 ${learnIdx+1}/${CHARS.length} 字`;
  document.getElementById('learnStatus').textContent = `已学 ${learnedSet.size}`;
  learnedSet.add(learnIdx); saveLearned();
}

function nextChar() {
  if (learnIdx < CHARS.length - 1) { learnIdx++; showLearnChar(); playSound('speak'); }
}
function prevChar() {
  if (learnIdx > 0) { learnIdx--; showLearnChar(); }
}
function speakChar() {
  const c = CHARS[learnIdx];
  speak(c.char);
  playSound('speak');
}

// ===== 听写模式 =====
function startQuiz() {
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizContent').classList.remove('hidden');
  quizIdx = 0; quizRight = 0; quizWrong = 0;
  // 随机选10个已学或前50个字
  let pool = [...Array(Math.min(50, CHARS.length)).keys()];
  if (learnedSet.size > 5) pool = [...learnedSet];
  quizQuestions = [];
  const picked = shuffle(pool).slice(0, 10);
  picked.forEach(idx => {
    const c = CHARS[idx];
    // 生成3个干扰项
    let others = shuffle(CHARS.filter((_,i) => i !== idx)).slice(0, 3).map(x => x.char);
    let options = shuffle([c.char, ...others]);
    quizQuestions.push({ char: c.char, pinyin: c.pinyin, options, answerIdx: options.indexOf(c.char) });
  });
  showQuizQ();
}

function showQuizQ() {
  if (quizIdx >= quizQuestions.length) { showQuizResult(); return; }
  const q = quizQuestions[quizIdx];
  document.getElementById('quizProgress').textContent = `📝 ${quizIdx+1}/${quizQuestions.length}`;
  document.getElementById('quizRight').textContent = `✅ ${quizRight}`;
  document.getElementById('quizWrong').textContent = `❌ ${quizWrong}`;
  document.getElementById('quizPrompt').textContent = q.pinyin;
  document.getElementById('quizQuestion').textContent = `请找出拼音 "${q.pinyin}" 对应的汉字`;
  
  const container = document.getElementById('quizOptions');
  container.innerHTML = q.options.map((opt, i) =>
    `<div class="quiz-opt" data-idx="${i}" onclick="selectQuizOpt(this, ${i}, ${q.answerIdx})">${opt}</div>`
  ).join('');
}

function selectQuizOpt(el, selected, answer) {
  if (el.classList.contains('correct') || el.classList.contains('wrong')) return;
  const allOpts = document.querySelectorAll('.quiz-opt');
  allOpts.forEach(o => o.onclick = null);
  
  if (selected === answer) {
    el.classList.add('correct');
    quizRight++;
    playSound('correct');
    setTimeout(() => { quizIdx++; showQuizQ(); }, 600);
  } else {
    el.classList.add('wrong');
    allOpts[answer].classList.add('highlight');
    quizWrong++;
    playSound('wrong');
    setTimeout(() => { quizIdx++; showQuizQ(); }, 1200);
  }
  document.getElementById('quizRight').textContent = `✅ ${quizRight}`;
  document.getElementById('quizWrong').textContent = `❌ ${quizWrong}`;
}

function showQuizResult() {
  document.getElementById('quizContent').classList.add('hidden');
  document.getElementById('quizResult').classList.remove('hidden');
  const pct = Math.round(quizRight / quizQuestions.length * 100);
  document.getElementById('quizEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '🌟';
  document.getElementById('quizResultText').textContent = pct >= 80 ? '太棒了！' : pct >= 50 ? '继续加油！' : '加油哦！';
  document.getElementById('quizResultDetail').textContent = `${quizQuestions.length}题答对${quizRight}题`;
  if (pct >= 80) playSound('win');
}

// ===== 字卡模式 =====
function renderCards(page) {
  const perPage = 25; const totalPages = Math.ceil(CHARS.length / perPage);
  const curPage = page || 0;
  
  // 页码
  const pageEl = document.getElementById('cardPages');
  pageEl.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const dot = document.createElement('div');
    dot.className = 'page-dot' + (i === curPage ? ' active' : '');
    dot.textContent = i + 1;
    dot.onclick = () => renderCards(i);
    pageEl.appendChild(dot);
  }

  // 字卡
  const start = curPage * perPage;
  const batch = CHARS.slice(start, start + perPage);
  const grid = document.getElementById('cardGrid');
  
  // 检查已学数量
  let learned = 0;
  batch.forEach((c, i) => { if (learnedSet.has(start + i)) learned++; });
  
  document.getElementById('cardCount').textContent = `已学 ${learnedSet.size}/${CHARS.length}`;
  document.getElementById('cardProgress').style.width = (learnedSet.size / CHARS.length * 100) + '%';

  grid.innerHTML = batch.map((c, i) => {
    const idx = start + i;
    const isLearned = learnedSet.has(idx);
    return `<div class="card ${isLearned ? 'learned' : ''}" data-idx="${idx}"
      onclick="flipCard(this, ${idx})">
      <span class="card-front">${c.char}</span>
      <span class="card-back" style="display:none;font-size:14px;color:#e67e22;">${c.pinyin}</span>
    </div>`;
  }).join('');
}

function flipCard(el, idx) {
  const front = el.querySelector('.card-front');
  const back = el.querySelector('.card-back');
  if (back.style.display === 'none') {
    front.style.display = 'none';
    back.style.display = 'block';
    el.classList.add('showing');
  } else {
    front.style.display = 'block';
    back.style.display = 'none';
    el.classList.remove('showing');
    // 标记已学
    learnedSet.add(idx);
    saveLearned();
    el.classList.add('learned');
    document.getElementById('cardCount').textContent = `已学 ${learnedSet.size}/${CHARS.length}`;
    document.getElementById('cardProgress').style.width = (learnedSet.size / CHARS.length * 100) + '%';
  }
}

// ===== 工具 =====
function shuffle(arr) { let a=[...arr]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function saveLearned() { localStorage.setItem('hzLearned', JSON.stringify([...learnedSet])); }

// ===== 初始化 =====
window.onload = function() {
  showLearnChar();
};
</script>
